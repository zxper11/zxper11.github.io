<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="Event Scheduler">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="manifest" href="/manifest.json">
    <title>Event Scheduler</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="edit-icon" class="material-icons">edit</div>
    <div class="weekdays">
        <div class="day" id="monday">
            <span>Monday</span>
            <div class="events-container"></div>
            <button class="add-event-btn" data-day="monday">Add Event</button>
        </div>
        <div class="day" id="tuesday">
            <span>Tuesday</span>
            <div class="events-container"></div>
            <button class="add-event-btn" data-day="tuesday">Add Event</button>
        </div>
        <div class="day" id="wednesday">
            <span>Wednesday</span>
            <div class="events-container"></div>
            <button class="add-event-btn" data-day="wednesday">Add Event</button>
        </div>
        <div class="day" id="thursday">
            <span>Thursday</span>
            <div class="events-container"></div>
            <button class="add-event-btn" data-day="thursday">Add Event</button>
        </div>
        <div class="day" id="friday">
            <span>Friday</span>
            <div class="events-container"></div>
            <button class="add-event-btn" data-day="friday">Add Event</button>
        </div>
    </div>

    <!-- Event popup -->
    <div id="event-popup" class="popup">
        <h2>Add Event</h2>
        <input type="text" id="event-input" placeholder="Enter your event">
        <button id="save-event-btn">Save Event</button>
        <span id="close-popup" class="material-icons">close</span>
    </div>

    <!-- Delete confirmation popup -->
    <div id="delete-popup" class="popup">
        <h2>Are you sure you want to delete this event?</h2>
        <button id="confirm-delete-btn">Yes</button>
        <button id="cancel-delete-btn">No</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
