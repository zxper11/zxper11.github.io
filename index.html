<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie</title>

    <style>
        /* Fullscreen layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Ensure a black background for any gaps */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://www.2embed.cc/embed/tt0264464" 
        allow="autoplay; fullscreen" 
        allowfullscreen>
    </iframe>

    <script>
        // Monitor and auto-close new tabs opened by the iframe
        const originalWindowOpen = window.open;
        
        // Override the `window.open` method
        window.open = function(url, name, specs) {
            const newTab = originalWindowOpen.call(window, url, name, specs);
            if (newTab) {
                console.log("New tab detected and closed:", url);
                newTab.close(); // Automatically close the new tab
            }
            return null; // Prevent further handling
        };

        console.log("Iframe tab-monitoring is active.");
    </script>
</body>
</html>
