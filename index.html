<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie1</title>

    <style>
        /* Fullscreen layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Ensure a black background for any gaps */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://www.2embed.cc/embed/tt0264464" 
        allow="autoplay; fullscreen" 
        allowfullscreen>
    </iframe>

    <script>
    // List to track and close any opened tabs
        const openedTabs = new Set();

        // Override window.open globally
        (function monitorWindowOpen() {
            const originalWindowOpen = window.open;

            window.open = function(url, name, specs) {
                const newTab = originalWindowOpen.call(window, url, name, specs);
                if (newTab) {
                    console.log("New tab detected and closed:", url);
                    newTab.close();
                    openedTabs.add(newTab);
                }
                return null; // Prevent further handling
            };

            // Polling loop to detect and close any manually opened tabs
            setInterval(() => {
                for (const tab of openedTabs) {
                    if (!tab.closed) {
                        tab.close();
                        console.log("Force-closed a tab.");
                    }
                }
            }, 500); // Check every 500ms
        })();

        // Periodically check for iframe-triggered new tabs
        setInterval(() => {
            try {
                // Scan for links inside the iframe
                const iframe = document.querySelector('iframe');
                const links = iframe.contentDocument.querySelectorAll('a[target="_blank"]');

                links.forEach(link => {
                    link.target = "_self"; // Force links to open in the same tab
                });
            } catch (err) {
                console.warn("Unable to access iframe links:", err);
            }
        }, 1000); // Check every second
    </script>
</body>
</html>
