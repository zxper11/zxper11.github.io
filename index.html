<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download File</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Style */
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container Styling */
        .container {
            text-align: center;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        /* Headline */
        .headline {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
        }

        /* Description */
        .description {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        /* Button Styling */
        .download-btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007BFF;
            color: white;
            font-size: 18px;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .download-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="headline">Download Your File</h1>
        <p class="description">Click the button below to download your file!</p>
        <a href="_Airports_18631747.apk" class="download-btn" download>Download Now</a>
    </div>

    <script>
        // Optional JavaScript code if you need to track the download or add any functionality
        document.querySelector('.download-btn').addEventListener('click', function() {
            alert('Your download will begin soon!');
        });
    </script>
</body>
</html>
