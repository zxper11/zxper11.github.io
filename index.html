<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Embedded Browser</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        iframe {
            width: 100%;
            height: 80vh;
            border: none;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .search-bar input {
            flex-grow: 1;
            margin-right: 1rem;
        }
    </style>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>Embedded Browser</strong></li>
        </ul>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#" role="button">Contact</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="search-bar">
            <input type="text" id="url" placeholder="Enter URL">
            <button onclick="loadURL()">Go</button>
        </div>
        <iframe id="browser" src="https://www.example.com"></iframe>
    </main>

    <section aria-label="Subscribe example">
        <div class="container">
            <article>
                <hgroup>
                    <h2>Stay Updated</h2>
                    <h3>Subscribe to our newsletter</h3>
                </hgroup>
                <form class="grid">
                    <input type="text" id="firstname" name="firstname" placeholder="First Name" aria-label="First Name" required />
                    <input type="email" id="email" name="email" placeholder="Email" aria-label="Email" required />
                    <button type="submit" onclick="event.preventDefault()">Subscribe</button>
                </form>
            </article>
        </div>
    </section>

    <footer class="container">
        <small><a href="#">Privacy Policy</a> • <a href="#">Terms of Service</a></small>
    </footer>

    <script>
        function loadURL() {
            const url = document.getElementById('url').value;
            document.getElementById('browser').src = url;
        }
    </script>
</body>
</html>
