<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#333">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Event Scheduler</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

<link rel="manifest" href="/manifest.json">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #2d2d2d;
      color: #fff;
    }

    header {
      background-color: #333;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 24px;
      margin: 0;
      color: #f0f0f0;
    }

    .edit-icon {
      font-size: 24px;
      cursor: pointer;
      color: #f0f0f0;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 20px;
      margin-top: 20px;
    }

    .day-box {
      background-color: #444;
      padding: 20px;
      border-radius: 10px;
      position: relative;
      min-height: 150px;
    }

    .day-box h2 {
      margin: 0;
      font-size: 18px;
      color: #f0f0f0;
    }

    .event {
      background-color: #555;
      border-radius: 5px;
      margin-top: 10px;
      padding: 10px;
      font-size: 14px;
      color: #f0f0f0;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .event:hover {
      background-color: #666;
    }

    .add-event {
      display: none;
      position: absolute;
      bottom: 10px;
      right: 10px;
      background-color: #777;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      color: #f0f0f0;
      cursor: pointer;
      transition: 0.3s;
    }

    .add-event:hover {
      background-color: #888;
    }

    .event-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #333;
      padding: 20px;
      border-radius: 10px;
      display: none;
      width: 80%;
      max-width: 400px;
    }

    .event-popup input {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      background-color: #555;
      border: none;
      color: #fff;
      font-size: 14px;
    }

    .event-popup button {
      background-color: #3c6e71;
      padding: 10px 15px;
      border: none;
      color: #fff;
      font-size: 14px;
      border-radius: 5px;
      margin-top: 10px;
      cursor: pointer;
    }

    .event-popup button:hover {
      background-color: #2a4d48;
    }

    .event-popup .close {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    .event-popup.active {
      display: block;
    }

    .delete-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #444;
      padding: 20px;
      border-radius: 10px;
      display: none;
      width: 80%;
      max-width: 400px;
    }

    .delete-popup button {
      background-color: #777;
      padding: 10px 15px;
      border: none;
      color: #f0f0f0;
      font-size: 14px;
      border-radius: 5px;
      margin-top: 10px;
      cursor: pointer;
    }

    .delete-popup button:hover {
      background-color: #888;
    }

    .delete-popup .close {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    .delete-popup.active {
      display: block;
    }

    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: repeat(1, 1fr);
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Event Scheduler</h1>
    <div class="edit-icon"><i class="fas fa-edit"></i></div>
  </header>

  <div class="grid-container">
    <div class="day-box" id="monday">
      <h2>Monday</h2>
      <div class="events-container" id="monday-events"></div>
      <button class="add-event" data-day="monday">Add Event</button>
    </div>
    <div class="day-box" id="tuesday">
      <h2>Tuesday</h2>
      <div class="events-container" id="tuesday-events"></div>
      <button class="add-event" data-day="tuesday">Add Event</button>
    </div>
    <div class="day-box" id="wednesday">
      <h2>Wednesday</h2>
      <div class="events-container" id="wednesday-events"></div>
      <button class="add-event" data-day="wednesday">Add Event</button>
    </div>
    <div class="day-box" id="thursday">
      <h2>Thursday</h2>
      <div class="events-container" id="thursday-events"></div>
      <button class="add-event" data-day="thursday">Add Event</button>
    </div>
    <div class="day-box" id="friday">
      <h2>Friday</h2>
      <div class="events-container" id="friday-events"></div>
      <button class="add-event" data-day="friday">Add Event</button>
    </div>
  </div>

  <!-- Event Popup -->
  <div class="event-popup" id="event-popup">
    <span class="close" id="close-popup"><i class="fas fa-times"></i></span>
    <h3>Add Event</h3>
    <input type="text" id="event-input" placeholder="Enter your event">
    <button id="save-event">Add Event</button>
  </div>

  <!-- Delete Confirmation Popup -->
  <div class="delete-popup" id="delete-popup">
    <span class="close" id="close-delete-popup"><i class="fas fa-times"></i></span>
    <h3>Are you sure you want to delete this event?</h3>
    <button id="confirm-delete">Yes, Delete</button>
    <button id="cancel-delete">No, Keep It</button>
  </div>

  <script>
    const eventPopup = document.getElementById('event-popup');
    const eventInput = document.getElementById('event-input');
    const saveEventBtn = document.getElementById('save-event');
    const closePopup = document.getElementById('close-popup');
    const editIcon = document.querySelector('.edit-icon');
    const addEventButtons = document.querySelectorAll('.add-event');
    const deletePopup = document.getElementById('delete-popup');
    const confirmDeleteBtn = document.getElementById('confirm-delete');
    const cancelDeleteBtn = document.getElementById('cancel-delete');
    let currentDay = null;
    let currentEventToDelete = null;
    let isEditMode = false;

    // Load events from localStorage
    const loadEvents = () => {
      const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday'];
      days.forEach(day => {
        const events = JSON.parse(localStorage.getItem(day)) || [];
        const eventsContainer = document.getElementById(`${day}-events`);
        eventsContainer.innerHTML = '';
        events.forEach((event, index) => {
          const eventDiv = document.createElement('div');
          eventDiv.classList.add('event');
          eventDiv.textContent = event;
          eventDiv.addEventListener('click', () => {
            if (isEditMode) {
              currentEventToDelete = { day, index };
              deletePopup.classList.add('active');
            }
          });
          eventsContainer.appendChild(eventDiv);
        });
      });
    };

    // Save event to localStorage
    const saveEvent = (day, event) => {
      const events = JSON.parse(localStorage.getItem(day)) || [];
      events.push(event);
      localStorage.setItem(day, JSON.stringify(events));
      loadEvents();
    };

    // Delete event
    const deleteEvent = () => {
      if (currentEventToDelete) {
        const { day, index } = currentEventToDelete;
        const events = JSON.parse(localStorage.getItem(day)) || [];
        events.splice(index, 1);
        localStorage.setItem(day, JSON.stringify(events));
        loadEvents();
        deletePopup.classList.remove('active');
      }
    };

    // Show the event popup
    addEventButtons.forEach(button => {
      button.addEventListener('click', (e) => {
        currentDay = e.target.getAttribute('data-day');
        eventPopup.classList.add('active');
      });
    });

    // Save the event
    saveEventBtn.addEventListener('click', () => {
      const event = eventInput.value.trim();
      if (event) {
        saveEvent(currentDay, event);
        eventInput.value = ''; // Clear input
        eventPopup.classList.remove('active');
      }
    });

    // Toggle edit mode
    editIcon.addEventListener('click', () => {
      isEditMode = !isEditMode;
      addEventButtons.forEach(button => {
        button.style.display = isEditMode ? 'inline-block' : 'none';
      });
      editIcon.style.color = isEditMode ? '#d9534f' : '#f0f0f0'; // Change color when edit mode is on
    });

    // Close the event popup
    closePopup.addEventListener('click', () => {
      eventPopup.classList.remove('active');
    });

    // Close the delete popup
    cancelDeleteBtn.addEventListener('click', () => {
      deletePopup.classList.remove('active');
    });

    // Confirm delete event
    confirmDeleteBtn.addEventListener('click', deleteEvent);

    // Load events on page load
    window.onload = loadEvents;
  </script>

</body>
</html>
