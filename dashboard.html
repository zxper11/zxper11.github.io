<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            const users = JSON.parse(localStorage.getItem('users')) || [];

            // Check user role
            const user = users.find(u => u.username === loggedInUser);
            if (!user) {
                // Handle case where user data is not found
                console.error('User data not found');
                return;
            }

            // Display username and role
            document.getElementById('loggedInUser').textContent = loggedInUser;
            document.getElementById('userRole').textContent = user.role;

            // Hide/show form based on user role
            if (user.role === 'admin' || loggedInUser === 'admin') {
                document.getElementById('applicationForm').style.display = 'block';
            } else {
                document.getElementById('applicationForm').style.display = 'none';
            }

            // Populate and manage applications list
            const applications = JSON.parse(localStorage.getItem('applications')) || [];

            const applicationsList = document.getElementById('applicationsList');
            applicationsList.innerHTML = ''; // Clear previous entries

            applications.forEach((app, index) => {
                const listItem = document.createElement('li');
                listItem.textContent = `Application by ${app.username}`;

                if (loggedInUser === 'admin' || loggedInUser === 'dxx') {
                    const approveBtn = document.createElement('button');
                    approveBtn.textContent = 'Approve';
                    approveBtn.addEventListener('click', () => approveApplication(index));
                    listItem.appendChild(approveBtn);

                    const declineBtn = document.createElement('button');
                    declineBtn.textContent = 'Decline';
                    declineBtn.addEventListener('click', () => declineApplication(index));
                    listItem.appendChild(declineBtn);
                }

                applicationsList.appendChild(listItem);
            });

            function approveApplication(index) {
                // Update application status to Approved
                applications[index].status = 'Approved';
                localStorage.setItem('applications', JSON.stringify(applications));

                // Notify the user or update UI as needed
                console.log(`Application by ${applications[index].username} has been approved.`);
            }

            function declineApplication(index) {
                // Update application status to Declined
                applications[index].status = 'Declined';
                localStorage.setItem('applications', JSON.stringify(applications));

                // Notify the user or update UI as needed
                console.log(`Application by ${applications[index].username} has been declined.`);
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <h2>Dashboard</h2>
        <p>Welcome, <span id="loggedInUser"></span>! Your role: <span id="userRole"></span></p>

        <!-- Application Form -->
        <div id="applicationForm" style="display: none;">
            <h3>Application Form</h3>
            <form id="appForm">
                <label for="token">Token:</label>
                <input type="text" id="token" required><br>
                <label for="secret">Secret:</label>
                <input type="text" id="secret" required><br>
                <label for="guildId">Guild ID:</label>
                <input type="text" id="guildId" required><br>
                <label for="clientId">Client ID:</label>
                <input type="text" id="clientId" required><br>
                <label for="verifiedRoleId">Verified Role ID:</label>
                <input type="text" id="verifiedRoleId" required><br>
                <label for="ownerId">Owner ID:</label>
                <input type="text" id="ownerId" required><br>
                <label for="logsChannelId">Logs Channel ID:</label>
                <input type="text" id="logsChannelId" required><br>
                <button type="submit">Submit</button>
            </form>
        </div>

        <!-- List of Applications -->
        <h3>Applications</h3>
        <ul id="applicationsList">
            <!-- Applications will be dynamically added here -->
        </ul>
    </div>
</body>
</html>
